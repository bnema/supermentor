<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>supermentor</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("supermentor:theme")
          const theme = saved === "dark" || saved === "light"
            ? saved
            : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
        } catch {}
      })()
    </script>
    <link rel="stylesheet" href="/mentor-styles.css">
  </head>
  <body>
    <aside id="lesson-outline"></aside>
    <main>
      <header class="sm-topbar">
        <div>
          <p class="sm-eyebrow">supermentor</p>
          <h1 id="lesson-title">Chargement…</h1>
        </div>
        <div class="sm-actions">
          <button id="theme-toggle" type="button">Thème</button>
          <button id="refresh" type="button">Rafraîchir</button>
        </div>
      </header>
      <section id="lesson-view"></section>
    </main>
    <script id="supermentor-bootstrap" type="application/json">{{BOOTSTRAP_JSON}}</script>
    <script type="module" src="/mentor-client.js"></script>
  </body>
</html>
