<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>supermentor</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("supermentor:theme")
          const theme = saved === "dark" || saved === "light"
            ? saved
            : window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
        } catch {}
      })()
    </script>
    <link id="highlight-theme" rel="stylesheet" href="/assets/highlight-github-dark.min.css">
    <link rel="stylesheet" href="/mentor-styles.css">
    <script defer src="/assets/highlight.min.js"></script>
  </head>
  <body>
    <aside id="lesson-outline">
      <div class="sm-sidebar-main"></div>
      <footer class="sm-sidebar-footer">
        <button id="theme-toggle" class="sm-icon-button" type="button" aria-label="Toggle theme" title="Toggle theme"><img src="/assets/icons/theme.svg" alt="" aria-hidden="true"></button>
        <button id="refresh" class="sm-icon-button" type="button" aria-label="Refresh lesson" title="Refresh lesson"><img src="/assets/icons/refresh.svg" alt="" aria-hidden="true"></button>
      </footer>
      <div id="sidebar-resizer" role="separator" aria-orientation="vertical" aria-label="Resize sidebar" tabindex="0"></div>
    </aside>
    <main>
      <header class="sm-topbar">
        <p class="sm-eyebrow">supermentor</p>
        <h1 id="lesson-title">Loading…</h1>
      </header>
      <section id="lesson-view"></section>
    </main>
    <script id="supermentor-bootstrap" type="application/json">{{BOOTSTRAP_JSON}}</script>
    <script type="module" src="/mentor-client.js"></script>
  </body>
</html>
